# ClawSec Configuration
# ClawSec 配置文件 - 默认启动设置
# 创建时间: 2026-03-14
# 更新时间: 2026-03-14 03:05

## 默认启动设置
CLAWSEC_AUTO_START=true
CLAWSEC_START_ON_OPENCLAW_BOOT=true
CLAWSEC_SYSTEM_AUTO_START=true

## 启动参数
CLAWSEC_ENABLE_MITM=false
CLAWSEC_PROXY_PORT=8888
CLAWSEC_LOG_DIR=/tmp/clawsec

## 监控模式
# - tunnel: 仅监控HTTP流量（推荐日常使用）
# - mitm: 完整HTTPS解密（需要CA证书）
CLAWSEC_MODE=tunnel

## 系统启动配置
# LaunchAgent: ~/Library/LaunchAgents/com.openclaw.clawsec.plist
# Shell配置: ~/.zshrc

## 环境变量（已添加到 ~/.zshrc）
# export CLAWSEC_AUTO_START=true
# export HTTP_PROXY=http://127.0.0.1:8888
# export HTTPS_PROXY=http://127.0.0.1:8888

## 启动脚本位置
CLAWSEC_MONITOR_SCRIPT=/tmp/clawsec-monitor.py

## 状态检查
# python3 /tmp/clawsec-monitor.py status
# python3 /tmp/clawsec-monitor.py threats

## 系统启动项管理
# 加载: launchctl load ~/Library/LaunchAgents/com.openclaw.clawsec.plist
# 卸载: launchctl unload ~/Library/LaunchAgents/com.openclaw.clawsec.plist
# 查看: launchctl list | grep clawsec
