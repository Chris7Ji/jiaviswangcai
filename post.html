            const params = new URLSearchParams(window.location.search);
            const postId = params.get('id');

            // Find post
            const post = allPosts.find(p => p.id === postId) || allPosts[0];

            // Render post
            document.getElementById('postDate').textContent = post.date;
            document.getElementById('postTitle').textContent = post.title;
            document.getElementById('postCategory').textContent = post.categoryLabel;
            document.getElementById('postBody').innerHTML = post.content;
            document.getElementById('postTags').innerHTML = post.tags.map(t => `<span class="post-page-tag">#${t}</span>`).join('');
