        }
        h1 {

        }
        .feature-tag {
            background: rgba(255, 215, 0, 0.15);

            padding: 8px 16px;
            border-radius: 20px;

        }

        }
        .option {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            width: 340px;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .option:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 50px rgba(255, 215, 0, 0.2);
        }
        .option img {
            width: 100%;
            border-radius: 12px;

        .option h3 {

            font-size: 1.3em;
        }
        .option p {
            color: #666;
            font-size: 14px;
            margin: 5px 0;
        }
        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 28px;
            background: linear-gradient(135deg, #E6A800 0%, #FFD700 100%);
            color: #1a1a2e;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
        }
        .instruction {
            margin-top: 40px;
            color: #aaa;
            font-size: 14px;
        }
