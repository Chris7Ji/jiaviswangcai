name: Deploy static site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Prepare deploy directory
        run: |
          mkdir _deploy
          # Copy all HTML files
          find . -maxdepth 1 -name "*.html" -exec cp {} _deploy/ \;
          # Copy JS and CSS
          cp -r js/ _deploy/ 2>/dev/null || true
          cp -r css/ _deploy/ 2>/dev/null || true
          # Copy images/ directory (all referenced images)
          cp -r images/ _deploy/ 2>/dev/null || true
          cp -r assets/ _deploy/ 2>/dev/null || true
          cp -r img/ _deploy/ 2>/dev/null || true
          # Do NOT copy root-level images - they are large generated files not referenced by pages
          # Copy CNAME and .nojekyll
          cp CNAME _deploy/ 2>/dev/null || true
          cp .nojekyll _deploy/ 2>/dev/null || true
          # Copy robots.txt and sitemap if they exist
          cp robots.txt _deploy/ 2>/dev/null || true
          cp sitemap.xml _deploy/ 2>/dev/null || true
          # Copy any nested HTML directories
          for dir in article projects; do
            if [ -d "$dir" ]; then cp -r "$dir" _deploy/; fi
          done
          echo "=== Deploy directory ==="
          find _deploy -type f | wc -l
          echo "files ready to deploy"
          du -sh _deploy/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_deploy'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
