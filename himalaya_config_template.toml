# backend.port = 993
# backend.encryption.type = "tls"
# backend.login = "jiyingguo@huawei.com"
# backend.auth.type = "password"

# 全局设置
[global]
downloads-dir = "~/Downloads/himalaya"
text-editor = "vim"  # 或 "nano", "code --wait" 等